const COMPASSION_GUIDELINES = `
당신은 한국컴패션 편지 번역 전문가입니다. 아래의 2025 번역유의사항 지침과 번역백서 고수편의 모든 내용을 철저히 따라 편지를 번역하세요.

## 1. 핵심 용어 번역 규칙

### 컴패션 어린이센터 관련
다음 단어들은 모두 "컴패션 어린이센터"로 번역:
- Project, center, student center, club, compassion project
- FCP, ICP, Partner church, The center, The child center
- CDC(Child Development Center), IDC(Integral Development Center)
- CDI(Child Development Institution), The project, Compassion project 등

### 선생님/교사 관련
다음 단어들은 "컴패션 어린이센터 교사"로 번역 (대필자 주석 포함):
- teacher, tutor, mentor, monitor, social worker, volunteer, accountant
- SDS, CDW(Child Development Worker), project director 등
- 단, 문맥상 실제 학교 선생님인 경우 제외

### 어린이 지칭
다음 단어들은 "어린이" 또는 어린이 이름으로 번역:
- Child, Student, the beneficiary, the participant 등
- 컴패션 공식 표현: '어린이' 또는 '후원 어린이' (아동, 후원 아동, 보호 아동 등의 표현 사용 금지)

### 4대 영역
- Cognitive Area → 지적 영역
- Socio-emotional Area → 사회정서적 영역
- Physical Area → 신체적 영역
- Spiritual Area → 영적 영역

## 2. 후원자 호칭 규칙 (어린이 → 후원자 편지)
어린이가 후원자님을 부르는 모든 호칭은 "후원자님"으로 통일합니다.
- 편지의 첫 줄(수신 인사)은 항상 "사랑하는 후원자님께"로 번역합니다.
  예) Dear OOO Church / Dear OOO Company / Dear [이름] / Dear Sponsor / Hello → 사랑하는 후원자님께
- How are you, friend? → 후원자님 어떻게 지내고 계시나요?
- What keeps you busy these days, uncle? → 어떤 일로 바쁘신가요 후원자님?
- "당신" 또는 후원자 이름으로 번역하지 않습니다.
- Mom/Dad와 같이 엄마/아빠를 표현하는 명칭은 국제 컴패션 가이드라인에 따라 번역하지 않습니다.

## 3. 날짜 번역 규칙
- 날짜가 있는 경우, 번역문 맨 첫 줄에 "날짜: 년 월 일" 형식으로 표기하고 한 줄 띄운 뒤 본문을 시작합니다.
  예) 날짜: 2017년 4월 21일
- 어린이 편지: 년, 월, 일 순으로 번역 (예: 날짜: 2017년 4월 21일)
- 후원자 편지: 영문 표준 표기법에 따라 월, 일, 년 순으로 번역 (예: 날짜: February 14, 2024)
- 날짜가 없는 편지는 날짜 줄을 생략하고 바로 본문 번역
- 어린이 첫 편지(CHINEW)에는 원래 날짜가 없음 — 정상임

## 4. 화자 구분 번역 규칙

### 핵심 원칙: 이 편지의 주인은 어린이입니다
어린이 이름으로 보내는 편지는 항상 어린이가 직접 말하는 1인칭 문체로 번역합니다.
대필자가 3인칭으로 아이를 지칭해도, 아이가 직접 말하는 것처럼 1인칭으로 바꿔 번역합니다.

### 3인칭 → 1인칭 변환 규칙 (매우 중요)
원문에 아이 이름이나 she/he로 된 3인칭 표현이 있으면 반드시 1인칭으로 바꾸세요:
- "Alpha sends greetings" → "후원자님께 인사 드려요" (편지 첫 문장은 주어 없이 시작해도 자연스러움)
- "She says she is doing well" → "잘 지내고 있어요"
- "He likes playing football" → "축구하는 것을 좋아해요"
- "[아이 이름] is grateful for your support" → "후원자님의 도움에 감사해요"
- "The child says~" / "The student mentions~" → 1인칭으로 변환

### 주어 반복 방지 규칙 (매우 중요)
한국어에서 "저는"을 매 문장마다 반복하면 매우 어색합니다. 다음 규칙을 따르세요:
- 같은 주어가 연속될 때는 주어를 생략하세요.
  나쁜 예) "저는 학교에 가요. 저는 공부를 좋아해요. 저는 친구들이 있어요."
  좋은 예) "저는 학교에 가요. 공부를 좋아하고, 친구들도 많아요."
- 문장을 자연스럽게 이어주는 접속어(그리고, 또, 그래서 등)를 활용하세요.
- 짧은 문장들은 하나로 합쳐서 번역해도 됩니다.

### 후원자에 대한 표현 처리
원문에 후원자를 "you are a faithful girl", "you are kind" 등으로 묘사할 경우,
후원자님을 "소녀", "소년" 등 성별/나이로 지칭하는 것은 자연스럽게 의역합니다:
- "You are a faithful girl" → "후원자님은 정말 신실한 분이에요"
- "You are a good man" → "후원자님은 정말 좋은 분이에요"

### 화자 구분 세부 규칙
1) 어린이가 직접 쓴 경우: 어린이 시점, 어린이 문체로 번역
2) 타자가 어린이의 말을 충실히 전달하는 경우: 어린이 시점, 어린이 문체로 번역
   예) "She says she's doing well. She's happy to write..." → "저는 잘 지내고 있어요. 편지를 쓸 수 있어 행복해요."
3) 타자가 자신의 의견을 담아 쓴 경우: 작성자 시점, 어른 문체로 번역
   예) "I am Carol's sister Mary. I am happy to tell you about Carol..." → "저는 캐롤의 언니 매리(Mary)입니다. 아이의 이야기를 전할 수 있어 기쁩니다."
## 5. 대필자 처리
- 편지 맺음말에서 어린이 이름 바로 아랫줄에 "* " 를 달고 대필 내용을 추가합니다.
- 출력 예시:
  사랑을 담아,
  다니엘 드림
  * 이 편지는 다니엘의 어머니, 마드리엔느(Madrienne)가 대필하였습니다.
- "From Madrienne, mother of Daniel" → "* 이 편지는 다니엘의 어머니, 마드리엔느(Madrienne)가 대필하였습니다."
- "Written by her tutor, Lauren" → "* 이 편지는 컴패션 어린이센터 교사, 로렌(Lauren)이 대필하였습니다."
- tutor, teacher, CDW, project director 등 센터 관련 직함은 모두 "컴패션 어린이센터 교사"로 표기합니다.
- Translator / Translated by / Verified by는 대필자가 아니므로 번역하지 않습니다.
- 대필 여부에 대한 정확한 언급이나 정보가 없을 때는 대필자 번역 생략

## 6. 그림/사진 처리
편지에 그림이나 사진이 있을 경우, 번역 본문 마지막 줄 바로 아래에 "* " 를 달고 그림 정보를 추가합니다.
- 설명 없을 때: "* 편지 2쪽에 어린이가 그린 그림이 있습니다."
- 설명 있을 때: "* 편지 2쪽에 어린이가 그린 그림이 있습니다. (집, 꽃, 나무)"
- 대필자 주석과 그림 주석이 함께 있을 경우, 어린이 이름 아래에 대필자 주석을 먼저 쓰고, 그 다음 줄에 그림 주석을 씁니다.
- 임의로 그림/사진 내용을 해석하여 번역하지 않습니다.

## 7. 성경 구절 번역
- 편지에 성경 구절이 등장하면 반드시 **개역개정 성경** 원문을 찾아 그대로 표기합니다.
- 영문 성경(NIV 등)으로 인용된 구절도 개역개정으로 변환하여 표기합니다.
- 절 번호나 책명이 편지에 명시된 경우 해당 구절의 개역개정 원문을 그대로 사용합니다.
- 편지에 성경 구절이 암시되어 있으나 출처가 명시되지 않은 경우, 문맥상 해당 구절을 특정할 수 있으면 개역개정 원문과 출처를 함께 표기합니다.
- 어떤 구절인지 특정하기 어려운 경우에만 원문 표현을 자연스럽게 번역합니다.
- 임의로 번역하거나 내용을 변형하지 않습니다.

### 성경 구절 출력 형식 (반드시 준수)
편지에 성경 구절이 나올 때마다 아래 형식을 정확히 따르세요:
후원자님과 함께 나누고 싶은 성경말씀이 있어요. [책명 장절] 말씀이에요.
"[개역개정 성경 원문]"

예시 1) 출처가 명시된 경우 (고린도후서 5:7):
후원자님과 함께 나누고 싶은 성경말씀이 있어요. 고린도후서 5장 7절 말씀이에요.
"이는 우리가 믿음으로 행하고 보는 것으로 행하지 아니함이로라"

예시 2) 출처 없이 구절 내용만 있는 경우 (시편 23:1로 특정 가능):
후원자님과 함께 나누고 싶은 성경말씀이 있어요. 시편 23편 1절 말씀이에요.
"여호와는 나의 목자시니 내게 부족함이 없으리로다"

예시 3) 암송 구절(memory verse)도 동일한 형식으로 표기합니다.
예시 4) 출처를 특정할 수 없는 경우에는 책명/장절 부분을 생략하고 구절 내용만 위 형식에 맞게 자연스럽게 번역합니다.

## 13. 고유명사 표기법
1) 사람, 지역, 음식, 기념일 이름: 음역 + 원어 표기 + 간단한 설명
   예) 세실리아(Cecilia), 캄피나 그란데(Campina Grande, 브라질의 도시)
   예) 우갈리(Ugali, 옥수수나 기장 가루로 만든 아프리카 음식으로 보통 고기나 채소와 함께 먹음)
   예) 차파티(Chapati, 아프리카식 팬케익), 아도보(Adobo, 필리핀의 대표 전통 음식)
   예) 훌깐(Julcan, 페루의 지명), 후닌(Junin, 페루 중부에 위치한 도시)
2) 알파벳 약자로 적힌 기관명, 질병 이름, 전문용어: 단어 그대로 사용 (필요 시만 설명 추가)
3) 브랜드명이나 애니메이션 제목 등은 정확한 한국어 표기를 사용
   예) 졸리비(Jollibee, 필리핀 패스트푸드 브랜드), 리틀 프린세스 소피아(Sofia the First, 디즈니 애니메이션)

## 14. 문법 오류 처리 (번역백서 고수편 1장)
- 아프리카 영어: "Am happy" → "I am happy"처럼 주어 생략이 자연스러운 표현. "Am"은 1인칭에만 쓰이므로 주어는 "I"로 유추
- 비영어권 어린이의 문법 오류: 전체 문맥을 파악하여 자연스럽게 다듬어 번역
- 어순이나 시제가 맞지 않아도 의미와 시점을 문맥으로 파악하여 번역
- 영어를 직접 쓰는 국가(가나GH, 케냐KE, 필리핀PH, 탄자니아TZ, 우간다UG)의 편지는 손글씨이거나 철자 오류가 있어도 문맥으로 파악하여 번역
- Broken English로 쓰인 편지는 맥락 속에서 의미와 시점을 파악하여 자연스럽게 다듬어 번역

## 15. 자연스러운 한국어 번역 원칙 (번역백서 고수편 3장)

### 번역 투 표현 피하기
- 수동태 → 능동문: "Your letter was well received." → "후원자님의 편지를 잘 받아 보았어요."
- "~에도 불구하고(in spite of)" → "~하지만", "~하는데도", "~에도", "~상황 속에서도"
- "~에 위치하다(be located in)" → "~에 있어요"
- "~으로부터(from)" + 장소 → "~에서"
- "~으로부터 ~의" (단순 수식) → "~의"
- 직역 피하기: "She has a sweet voice." → "그녀는 목소리가 아름답다."

### 자주 틀리는 맞춤법 (올바른 표기)
- 가족분들은 (O) / 가족 분들은 (X)
- 바라요 (O) / 바래요 (X)
- 이에요/예요 (O) / 이예요/에요 (X)

### 긴 문장 처리
- 문장이 지나치게 길면 후원자님이 이해하기 쉽도록 적당한 길이로 나눠 번역
- 주어와 서술어의 호응이 맞는지 반드시 확인
- 편지 내용이 길면 인사말/안부/학교생활/센터생활/기도제목/맺음말 등으로 적절히 문단 구분

## 16. 번역 톤
- 어린이가 후원자님께 쓰는 편지임을 항상 기억
- 어린이다운 표현, 순수함, 감사함이 잘 전달되도록 번역
- 후원자님을 향한 존경과 애정이 느껴지도록 번역
- 교과서식 표현 피하기: "I was too tired to do that." → "너무 피곤해서 할 수 없었어요."
- 내가 일상생활에서 사용하는 표현인지 항상 확인

## 17. 후원자 편지 번역 시 주의사항 (번역백서 고수편 4장)
- 후원자 편지(한→영)의 경우 원문의 주어를 명확하게 파악한 후 번역
- 문장이 지나치게 길거나 주술 호응이 맞지 않으면, 간결한 여러 문장으로 정리 후 번역
- 어린이 이름은 시스템에서 제공하는 철자와 동일하게 표기
- 후원자님의 정서와 감정이 자연스럽게 드러나도록 다듬어 번역

## 18. 어린이 보호 (Child Protection) 신고 지침 (번역백서 고수편 5장)

번역 중 아래 내용이 발견되면 반드시 번역을 완료한 뒤 [신고필요] 태그를 추가하고, 신고 사유를 간략히 명시하세요. 번역 내용 자체는 정확하게 그대로 번역합니다.

### 반드시 신고해야 하는 내용
1. **신체적 학대**: 어린이가 가족, 친구, 이웃 등 제3자로부터 신체적 폭력·폭행을 당하고 있다는 정황
2. **정서적 학대**: 조롱, 위협, 협박, 차별, 거부, 적대적 대우 등 정서적 학대를 받고 있다는 정황
3. **성적 학대**: 성추행, 성폭행 등 성적 학대를 당했거나 그 결과(임신, 출산 등)에 대한 언급
4. **방임·방치**: 적절한 양육 환경이 제공되지 않거나 기본적 필요(음식, 의료 등)가 충족되지 않는 정황
5. **착취**: 상업적 착취, 아동 노동, 강제 결혼 등

### 신고 시 [신고필요] 태그 사용법
- 번역 완료 후 맨 마지막 줄에 다음과 같이 추가:
  [신고필요] 사유: (예: 제3자에 의한 성폭행 정황 / 부모로부터 신체적 학대 정황 / 정서적 학대 및 방임 정황 등)
- 정확한 판단이 어려운 경우에도 의심되면 [신고필요] 태그를 추가하세요. 담당 직원이 최종 판단합니다.
- 신고 후 편지 내용은 외부에 절대 유출하지 말 것 — 편지 내용은 개인정보와 동일하게 취급됩니다.

### 신고 대상이 아닌 경우
- 어린이가 단순히 어렵고 가난한 생활 환경을 서술하는 경우 (신고 없이 번역)
- 질병, 자연재해, 코로나19 등 외부 상황으로 인한 어려움 (신고 없이 번역)
- 후원자/어린이의 개인정보(주소, SNS 등) 포함 시 → 번역하지 않고 별도 신고
`;

        : `\n\n## ★ 최우선 지시 — 대필 편지 번역 시점 (다른 모든 규칙보다 우선)\n이 편지는 대필자가 쓴 편지입니다. 대필자 본인의 시점(작성자 시점, 어른 문체)으로 번역하세요.\n- "I am [이름], [어린이]의 [관계]입니다" 등 대필자 본인의 말투를 그대로 살리세요.\n- 어린이에 대해 3인칭("그 아이는", "아이가")으로 서술하세요.\n- 어린이 이름 아래에 "* 이 편지는 [관계], [대필자 이름]이 대필하였습니다." 주석을 추가하세요. 단, 대필자가 교사인 경우 반드시 "컴패션 어린이센터 교사"로 표기하세요.`
      : "";

    return COMPASSION_GUIDELINES + directionNote + countryNote + `\n\n## 번역 방식\n${toneInstructions[tone]}\n\n## 편지 시작 (중요)\n어린이→후원자 편지의 경우, 수신 인사 첫 줄은 형식에 관계없이 반드시 "사랑하는 후원자님께"로 번역하세요. "Dear OOO", "Hello", "Hi", "Greetings" 등 어떤 표현이든 모두 "사랑하는 후원자님께"로 통일합니다.\n\n## 1인칭 전환 및 자연스러운 문체 (매우 중요)\\n원문에 아이 이름이나 she/he 등 3인칭 표현이 있어도 반드시 1인칭으로 바꿔 번역하세요.\\n편지 첫 문장은 \"저는\"으로 시작하지 않아도 됩니다. \"후원자님께 인사 드려요\"처럼 주어 없이 시작하면 더 자연스럽습니다.\\n\"저는\"을 매 문장마다 반복하지 마세요. 주어가 같으면 생략하고 접속어로 이어주세요.\\n나쁜 예) \"저는 학교에 가요. 저는 공부를 좋아해요. 저는 친구가 많아요.\"\\n좋은 예) \"학교에 가서 공부를 열심히 하고 있어요. 친구들도 많이 생겼어요.\"\\n후원자님을 \"소녀\", \"소년\" 등으로 지칭하는 표현은 의역하세요. 예) \"You are a faithful girl\" → \"후원자님은 정말 신실한 분이에요\"\\n\\n## 성경 구절 처리 (매우 중요)\\n편지에 성경 구절이 나오면 반드시 아래 형식을 정확히 따르세요:\\n후원자님과 함께 나누고 싶은 성경말씀이 있어요. [책명 장절] 말씀이에요.\\n\"[개역개정 성경 원문]\"\\n예시) 후원자님과 함께 나누고 싶은 성경말씀이 있어요. 고린도후서 5장 7절 말씀이에요.\\n\"이는 우리가 믿음으로 행하고 보는 것으로 행하지 아니함이로라\"\\n출처를 특정할 수 없는 경우, 책명/장절 부분을 생략하고 구절 내용만 자연스럽게 번역하세요.\\n영문 성경 구절도 반드시 개역개정으로 변환하여 위 형식에 맞게 출력하세요.` + ghostNote;

  };

  const buildUserPrompt = () => {
    const info = [
      childName && `아동 이름: ${childName}`,
      childCountry && `국가: ${childCountry}`,
      childAge && `나이: ${childAge}세`,
      childGender && `성별: ${childGender}`,
      ghostwritten && `대필 여부: 선생님이 대필한 편지입니다.`,
      ghostwriterInfo && `대필자 정보: ${ghostwriterInfo}`,
      hasDrawing && `그림/사진: 있음${drawingDesc ? ` (${drawingDesc})` : ""}`,
    ].filter(Boolean).join("\n");

    return `[편지 정보]\n${info || "정보 없음"}\n\n위 편지를 번역해 주세요:`;
  };

  const translate = async () => {
    if (inputMode === "text" && !originalText.trim()) {
      setError("편지 원문을 입력해 주세요.");
      return;
    }
    if (inputMode === "image" && images.length === 0) {
      setError("편지 이미지를 업로드해 주세요.");
      return;
    }
    setError("");
    setLoading(true);
    try {
      let messages;
      if (inputMode === "image") {
        const currentImages = imagesRef.current;
        const withPage = [...currentImages]
          .filter(img => img.detectedPage !== null && !img.pageDetecting)
          .sort((a, b) => a.detectedPage - b.detectedPage);
        const withoutPage = currentImages.filter(img => img.detectedPage === null || img.pageDetecting);
        const orderedImages = withPage.length > 0 ? [...withPage, ...withoutPage] : currentImages;

        setImages(orderedImages);

        const imageBlocks = orderedImages.map(img => ({
          type: "image",
          source: { type: "base64", media_type: img.mime, data: img.base64 }
        }));
        const pageInfo = orderedImages.map((img, i) =>
          img.detectedPage
            ? `이미지 ${i+1}: Page ${img.detectedPage}${img.detectedTotal ? ` of ${img.detectedTotal}` : ""}`
            : `이미지 ${i+1}: 페이지 번호 미감지`
        ).join(", ");

        // 1단계: 이미지 OCR — 텍스트 판독
        setLoadingStep("ocr");
        const ocrResponse = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 2000,
            messages: [{
              role: "user",
              content: [
                { type: "text", text: `아래 ${orderedImages.length}장의 이미지는 한 통의 편지입니다 (순서: ${pageInfo}).\n편지에 적힌 모든 텍스트를 페이지 순서대로 빠짐없이 원문 그대로 판독해 주세요. 날짜, 수신인, 본문, 서명, 대필자 정보 등 모든 내용을 포함하세요. 판독한 원문만 출력하고 설명은 쓰지 마세요.` },
                ...imageBlocks,
              ]
            }]
          })
        });
        const ocrData = await ocrResponse.json();
        const ocrText = ocrData.content?.map(i => i.text || "").join("\n") || "";

        // 2단계: 판독된 텍스트를 시스템 프롬프트 지침에 따라 번역
        setLoadingStep("translate");
        messages = [{
          role: "user",
          content: buildUserPrompt() + `\n\n[원문 (이미지 판독)]\n${ocrText}`
        }];
      } else {
        messages = [{
          role: "user",
          content: buildUserPrompt() + `\n\n[원문]\n${originalText}`
        }];
      }

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: buildSystemPrompt(),
          messages,
        }),
      });
      const data = await response.json();
      const fullText = data.content?.map(i => i.text || "").join("\n") || "";
      const summaryMatch = fullText.match(/\[한줄요약\]\s*(.+)/);
      const summary = summaryMatch ? summaryMatch[1].trim() : null;
      const cpMatch = fullText.match(/\[신고필요\]\s*사유:\s*(.+)/);
      const cpAlert = cpMatch ? cpMatch[1].trim() : null;
      const translated = fullText
        .replace(/\[한줄요약\].*/s, "")
        .replace(/\[신고필요\].*/s, "")
        .trim();
      setResult({ translated, summary, cpAlert, tone, country: childCountry, name: childName, letterType, apiMessages: messages });
      setChatHistory([]);
      setLoadingStep("");
      setStep("result");
    } catch (e) {
      setError("번역 중 오류가 발생했습니다. 다시 시도해 주세요.");
      setLoadingStep("");
    }
    setLoading(false);
  };

  const execCommandCopy = (text, onSuccess) => {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;pointer-events:none;";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      const ok = document.execCommand("copy");
      if (ok) onSuccess();
    } catch (e) {}
    document.body.removeChild(ta);
  };

  const copyResult = () => {
    if (!result) return;
    const lines = [result.translated];
    if (result.cpAlert) lines.push(`\n[신고필요] 사유: ${result.cpAlert}`);
    const text = lines.join("\n");

    const doSuccess = () => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(doSuccess).catch(() => {
        execCommandCopy(text, doSuccess);
      });
    } else {
      execCommandCopy(text, doSuccess);
    }
  };

  // 수정된 번역 복사 (채팅 카드)
  const copyChatResult = () => {
    if (!result) return;
    const lines = [result.translated];
    if (result.cpAlert) lines.push(`\n[신고필요] 사유: ${result.cpAlert}`);
    const text = lines.join("\n");
    const doSuccess = () => { setCopiedChat(true); setTimeout(() => setCopiedChat(false), 2000); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(doSuccess).catch(() => execCommandCopy(text, doSuccess));
    } else {
      execCommandCopy(text, doSuccess);
    }
  };

  const reset = () => {
    setStep("input");
    setResult(null);
    setChildName("");
    setChildCountry("");
    setChildAge("");
    setChildGender("");
    setLetterType("child_to_sponsor");
    setOriginalText("");
    setImages([]);
    setInputMode("text");
    setTone("friendly");
    setGhostwritten(false);
    setGhostwriterInfo("");
    setGhostVoice("child");
    setHasDrawing(false);
    setDrawingDesc("");
    setDetectingGhost(false);
    setDetectingDrawing(false);
    setError("");
    setCopied(false);
    setChatHistory([]);
    setChatInput("");
  };

  const retranslate = () => {
    setStep("input");
    setResult(null);
    setOriginalText("");
    setImages([]);
    setError("");
    setCopied(false);
    setLoadingStep("");
    setChatHistory([]);
    setChatInput("");
  };

  // 대화형 번역 수정
  const sendChatMessage = async () => {
    if (!chatInput.trim() || chatLoading || !result) return;
    const userMsg = chatInput.trim();
    setChatInput("");

    const newHistory = [...chatHistory, { role: "user", content: userMsg }];
    setChatHistory(newHistory);
    setChatLoading(true);

    try {
      const firstUserMsg = result.apiMessages[0];
      const assistantContent = result.translated
        + (result.summary ? `\n[한줄요약] ${result.summary}` : "")
        + (result.cpAlert ? `\n[신고필요] 사유: ${result.cpAlert}` : "");
      const firstAssistantMsg = { role: "assistant", content: assistantContent };

      // 이전 대화 히스토리 (현재 사용자 메시지 제외)
      const prevTurns = chatHistory.map(m => ({ role: m.role, content: m.content }));

      const messages = [
        firstUserMsg,
        firstAssistantMsg,
        ...prevTurns,
        { role: "user", content: userMsg }
      ];

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: buildSystemPrompt(),
          messages,
        }),
      });
      const data = await response.json();
      const fullText = data.content?.map(i => i.text || "").join("\n") || "";

      const summaryMatch = fullText.match(/\[한줄요약\]\s*(.+)/);
      const newSummary = summaryMatch ? summaryMatch[1].trim() : result.summary;
      const cpMatch = fullText.match(/\[신고필요\]\s*사유:\s*(.+)/);
      const newCpAlert = cpMatch ? cpMatch[1].trim() : result.cpAlert;
      const newTranslated = fullText
        .replace(/\[한줄요약\].*/s, "")
        .replace(/\[신고필요\].*/s, "")
        .trim();

      setChatHistory([...newHistory, { role: "assistant", content: fullText }]);
      setResult(prev => ({ ...prev, translated: newTranslated, summary: newSummary, cpAlert: newCpAlert }));
    } catch (e) {
      setChatHistory([...newHistory, { role: "assistant", content: "오류가 발생했습니다. 다시 시도해 주세요." }]);
    }
    setChatLoading(false);
    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
  };

  const autoDetectGhostwriter = async (checked) => {
    setGhostwritten(checked);
    if (!checked || inputMode !== "image" || images.length === 0) return;
    setDetectingGhost(true);
    setGhostwriterInfo("");
    try {
      const img = images[0];
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 80,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: img.mime, data: img.base64 } },
              { type: "text", text: `이 편지 이미지에서 대필자(ghostwriter) 정보를 찾아주세요. "Written by", "Dictated by", "From", "Translated by" 등의 표현 뒤에 오는 이름이나 관계를 찾아주세요. JSON으로만 응답하세요. 찾은 경우: {"found": true, "info": "Written by her mother, Jane"} / 없으면: {"found": false}` }
            ]
          }]
        })
      });
      const data = await res.json();
      const text = data.content?.map(i => i.text || "").join("") || "";
      const match = text.match(/\{[^}]+\}/);
      if (match) {
        const parsed = JSON.parse(match[0]);
        if (parsed.found && parsed.info) setGhostwriterInfo(parsed.info);
      }
    } catch (e) {}
    setDetectingGhost(false);
  };

  const autoDetectDrawing = async (checked) => {
    setHasDrawing(checked);
    if (!checked || inputMode !== "image" || images.length === 0) return;
    setDetectingDrawing(true);
    setDrawingDesc("");
    try {
      const descriptions = await Promise.all(images.map(async (img, idx) => {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 80,
            messages: [{
              role: "user",
              content: [
                { type: "image", source: { type: "base64", media_type: img.mime, data: img.base64 } },
                { type: "text", text: `이 편지 이미지에 어린이가 그린 그림이나 사진이 있나요? JSON으로만 응답하세요. 있으면: {"found": true, "desc": "집, 꽃, 나무"} / 없으면: {"found": false}` }
              ]
            }]
          })
        });
        const data = await res.json();
        const text = data.content?.map(i => i.text || "").join("") || "";
        const match = text.match(/\{[^}]+\}/);
        if (match) {
          const parsed = JSON.parse(match[0]);
          if (parsed.found && parsed.desc) return `${idx+1}쪽: ${parsed.desc}`;
        }
        return null;
      }));
      const found = descriptions.filter(Boolean);
      if (found.length > 0) setDrawingDesc(found.join(" / "));
    } catch (e) {}
    setDetectingDrawing(false);
  };

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

          --warm: #f5ede0;

          --brown-dark: #3d2010;
          --brown: #7a4f2e;
          --brown-mid: #a06840;
          --brown-light: #c49265;
          --accent: #cf6b2e;
          --accent-light: #e8a06a;
          --gold: #d4a02a;
          --green: #4a7255;
          --blue: #2e6098;
          --border: #e8d5bc;
          --shadow: 0 2px 20px rgba(61,32,16,0.08);
          --shadow-lg: 0 8px 40px rgba(61,32,16,0.14);
        }

        .app { max-width: 740px; margin: 0 auto; padding: 28px 16px 80px; }
        .header { text-align: center; margin-bottom: 28px; background: var(--paper); border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-lg); overflow: hidden; }
        .header-top { background: linear-gradient(135deg, #3d2010 0%, #7a4f2e 50%, #cf6b2e 100%); padding: 28px 24px 24px; color: #fff; }
        .header-badge { display: inline-block; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); color: #fde8c8; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 4px 14px; border-radius: 20px; margin-bottom: 14px; }
        .header h1 { font-family: 'Nanum Myeongjo', serif; font-size: 26px; font-weight: 800; line-height: 1.3; color: #fff; margin-bottom: 6px; }
        .header-sub { color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 300; }
        .header-bottom { padding: 14px 20px; background: var(--warm); display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .header-tag { font-size: 11.5px; color: var(--brown); font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .header-tag::before { content: '✓'; color: var(--accent); font-weight: 700; }

        .step-dot.active { background: var(--accent); transform: scale(1.3); }

        .card-title span { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 400; color: var(--brown-light); margin-left: 4px; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

              <div className={`checkbox-row ${ghostwritten ? "checked" : ""}`} onClick={() => autoDetectGhostwriter(!ghostwritten)}>
                <div className="checkbox-custom">{ghostwritten ? "✓" : ""}</div>
                <span className="checkbox-label">✏️ 선생님/가족이 대필한 편지입니다</span>
              </div>
              {ghostwritten && (
                <div className="sub-input">
                  <input
                    placeholder={detectingGhost ? "판독 중..." : "대필자 정보 (자동 판독 또는 직접 입력)"}
                    value={ghostwriterInfo}
                    onChange={e => setGhostwriterInfo(e.target.value)}
                    disabled={detectingGhost}
                    style={{paddingRight: detectingGhost ? "38px" : undefined}}
                  />
                  {detectingGhost && <div className="detect-spinner" />}
                  {!detectingGhost && inputMode === "image" && images.length > 0 && (
                    <div className="detect-hint">🔍 이미지에서 자동 판독했습니다. 내용을 확인하고 필요하면 수정하세요.</div>
                  )}
                  {!detectingGhost && inputMode !== "image" && (
                    <div className="detect-hint">💡 이미지 업로드 시 자동 판독됩니다.</div>
                  )}
                  <div className="voice-toggle">
                    <span className="voice-toggle-label">번역 시점</span>
                    <div className="voice-toggle-options">
                      <button className={`voice-btn ${ghostVoice === "child" ? "active" : ""}`} onClick={() => setGhostVoice("child")}>👧 아이가 직접 말하는 것처럼</button>
                      <button className={`voice-btn ${ghostVoice === "writer" ? "active" : ""}`} onClick={() => setGhostVoice("writer")}>✍️ 대필자 시점 그대로</button>
                    </div>
                  </div>
                </div>
              )}

              <div className={`checkbox-row ${hasDrawing ? "checked" : ""}`} onClick={() => autoDetectDrawing(!hasDrawing)}>
                <div className="checkbox-custom">{hasDrawing ? "✓" : ""}</div>
                <span className="checkbox-label">🎨 편지에 그림이나 사진이 있습니다</span>
              </div>
              {hasDrawing && (
                <div className="sub-input">
                  <input
                    placeholder={detectingDrawing ? "판독 중..." : "그림/사진 설명 (자동 판독 또는 직접 입력)"}
                    value={drawingDesc}
                    onChange={e => setDrawingDesc(e.target.value)}
                    disabled={detectingDrawing}
                    style={{paddingRight: detectingDrawing ? "38px" : undefined}}
                  />
                  {detectingDrawing && <div className="detect-spinner" />}
                  {!detectingDrawing && inputMode === "image" && images.length > 0 && (
                    <div className="detect-hint">🔍 이미지에서 자동 판독했습니다.</div>
                  )}
                  {!detectingDrawing && inputMode !== "image" && (
                    <div className="detect-hint">💡 이미지 업로드 시 자동 판독됩니다.</div>
                  )}
                </div>
              )}
            </div>

            <div className="card">
              <div className="card-header">
                <div className="card-num">2</div>
                <div className="card-title">편지 원문 입력</div>
              </div>
              <div className="tabs">
                <button className={`tab ${inputMode==="text"?"active":""}`} onClick={()=>setInputMode("text")}>📝 텍스트 입력</button>
                <button className={`tab ${inputMode==="image"?"active":""}`} onClick={()=>setInputMode("image")}>📷 이미지 업로드</button>
              </div>
              {inputMode === "text" ? (
                <textarea
                  placeholder={letterType === "sponsor_to_child" ? "여기에 후원자님 편지 원문(한국어)을 입력하세요..." : "여기에 편지 원문을 입력하세요 (영어 또는 기타 언어)..."}
                  value={originalText}
                  onChange={e=>setOriginalText(e.target.value)}
                />
              ) : (
                <div>
                  <input ref={fileInputRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleImageUpload} />
                  <div className="upload-area" onClick={()=>fileInputRef.current.click()}>
                    <div className="upload-icon">📬</div>
                    <p className="upload-hint"><strong>클릭하여 편지 이미지를 업로드</strong>하세요</p>
                    <p className="upload-hint" style={{fontSize:11.5,marginTop:4}}>여러 장 동시 선택 가능 · JPG, PNG, GIF 등 지원 · 손글씨 편지도 인식 가능</p>
                  </div>
                  {images.length > 0 && (
                    <div className="image-preview-grid">
                      {images.map((img, idx) => (
                        <div key={idx} className="image-preview-item">
                          <img src={img.preview} alt={`편지 ${idx+1}`} className="preview-thumb" />
                          <div className="image-preview-label">
                            {img.pageDetecting ? "감지 중..." : img.detectedPage ? `P.${img.detectedPage}${img.detectedTotal ? `/${img.detectedTotal}` : ""}` : `${idx+1}쪽`}
                          </div>
                          {img.pageDetecting && <div className="page-detecting-overlay"><div className="page-detect-spin" /></div>}
                          {!img.pageDetecting && img.detectedPage && <div className="page-detected-badge">✓ 감지됨</div>}
                          <button className="image-remove-btn" onClick={() => removeImage(idx)}>✕</button>
                        </div>
                      ))}
                      <div className="image-add-more" onClick={()=>fileInputRef.current.click()}>
                        <span style={{fontSize:24}}>＋</span>
                        <span style={{fontSize:11.5,marginTop:4}}>추가</span>
                      </div>
                    </div>
                  )}
                  {images.length > 0 && (
                    <p className="upload-hint" style={{marginTop:8, textAlign:"center"}}>
                      총 <strong style={{color:"var(--accent)"}}>{images.length}장</strong>
                      {images.some(img => img.pageDetecting) && " · 페이지 번호 감지 중..."}
                      {!images.some(img => img.pageDetecting) && images.some(img => img.detectedPage) && ` · ${images.filter(img => img.detectedPage).length}장 페이지 번호 감지됨 — 번역 시 자동 정렬됩니다`}
                      {!images.some(img => img.pageDetecting) && !images.some(img => img.detectedPage) && " · 페이지 번호 미감지 — 업로드 순서대로 번역됩니다"}
                    </p>
                  )}
                </div>
              )}
            </div>

            <div className="card">
              <div className="card-header">
                <div className="card-num">3</div>
                <div className="card-title">번역 스타일</div>
              </div>
              <div className="tone-list">
                {TONE_OPTIONS.map(t=>(
                  <div key={t.value} className={`tone-item ${tone===t.value?"sel":""}`} onClick={()=>setTone(t.value)}>
                    <div className="tone-radio" />
                    <div>
                      <div className="tone-label">{t.label}</div>
                      <div className="tone-desc">{t.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {error && <div className="error">⚠️ {error}</div>}

            {anyDetecting && (
              <div className="error" style={{background:"#fff8e6", borderColor:"#f5d87a", color:"#7a5800"}}>
                🔍 이미지 페이지 번호 감지 중입니다. 완료 후 번역이 활성화됩니다...
              </div>
            )}

            <button className="btn-translate" onClick={translate} disabled={loading || anyDetecting}>
              {loading ? "번역 중..." : anyDetecting ? "페이지 감지 중..." : "✨ 번역 시작하기"}
            </button>
          </>
        )}

        {loading && (
          <div className="card loading">
            <div className="loading-title">{loadingStep === "ocr" ? "편지 내용을 판독하고 있어요" : "편지를 번역하고 있어요"}</div>
            <div className="loading-sub">{loadingStep === "ocr" ? "이미지에서 텍스트를 정확히 읽어내는 중입니다..." : "2025 번역유의사항 + 번역백서 고수편 지침에 따라 꼼꼼하게 번역 중입니다..."}</div>
            <div className="dots">
              <div className="dot" /><div className="dot" /><div className="dot" />
            </div>
          </div>
        )}

        {step === "result" && result && !loading && (
          <>
            <div className="card">
              <div className="card-header">
                <div className="card-num">✓</div>
                <div className="card-title">번역 완료</div>
              </div>

              <div className="result-meta">
                {result.name && <span className="meta-chip">👧 {result.name}</span>}
                {result.country && <span className="meta-chip">🌍 {result.country}</span>}
                <span className="meta-chip accent">{TONE_OPTIONS.find(t=>t.value===result.tone)?.label}</span>
                <span className="meta-chip">{result.letterType === "sponsor_to_child" ? "💌 후원자→어린이" : "✉️ 어린이→후원자"}</span>
                <span className="meta-chip" style={{background:"#f0f7f0",borderColor:"#b8d8ba",color:"#3a6040"}}>✓ 고수편 1~5장 반영</span>
                {result.cpAlert && <span className="meta-chip" style={{background:"#fff0f0",borderColor:"#e05050",color:"#c0392b",fontWeight:700}}>🚨 신고 필요</span>}
              </div>

              {result.cpAlert && (
                <div className="cp-alert">
                  <div className="cp-alert-title">🚨 어린이 보호(Child Protection) 신고가 필요한 편지입니다</div>
                  <div className="cp-alert-body">
                    번역 내용에서 어린이 보호가 필요한 정황이 감지되었습니다.<br/>
                    번역을 완료한 후 <strong>즉시 담당 직원에게 신고</strong>해 주세요.
                  </div>
                  <div className="cp-alert-reason">📋 감지된 사유: {result.cpAlert}</div>
                  <div className="cp-steps">
                    <strong>신고 절차:</strong> 번역메이트 신고 → 한국컴패션 내용 판단 → 어린이보호(CP) 담당 현지 문의 → 국제컴패션 CP 담당 수혜국 문의 → 수혜국 센터 어린이 보호 조치<br/>
                    ⚠️ 신고 후 편지 내용은 외부에 절대 유출하지 마세요.
                  </div>
                </div>
              )}

              <div className="guideline-note">
                💡 <strong>자동 적용된 지침:</strong> 컴패션 용어 통일 · 후원자 호칭 통일 · 화자 구분 · 인사말/끝인사/맺음말 규칙 · 4대 영역 · 기독교 표현 · 고유명사 음역+설명 · 코로나19 용어 · 대필자 처리 · 아프리카 영어 문법 허용 · 한국어 맞춤법 교정 · 번역 투 표현 제거 · 자연스러운 문장 구성 · 어린이 보호 신고 정황 감지
              </div>

              <div className="translation-box">{result.translated}</div>

              {result.summary && (
                <div className="summary-box">
                  <span className="summary-icon">💌</span>
                  <div><strong>한 줄 요약:</strong> {result.summary}</div>
                </div>
              )}

              <div className="action-row">
                <button className={`btn-copy${copied ? " copied" : ""}`} onClick={copyResult}>
                  {copied ? "✅ 복사됨!" : "📋 전체 복사하기"}
                </button>
                <button className="btn-retranslate" onClick={retranslate}>🔄 같은 편지 다시 번역</button>
                <button className="btn-secondary" onClick={reset}>↩ 새 편지 번역</button>
              </div>
            </div>

            {/* 대화형 번역 수정 */}
            <div className="card chat-card">
              <div className="card-header">
                <div className="card-num" style={{background:"var(--green)"}}>✦</div>
                <div className="card-title">번역 수정 요청 <span>번역가에게 말하듯 자유롭게 요청하세요</span></div>
                {chatHistory.length > 0 && (
                  <button
                    className={`btn-copy btn-copy-chat${copiedChat ? " copied" : ""}`}
                    onClick={copyChatResult}
                    style={{marginLeft:"auto", padding:"7px 14px", fontSize:"12px", minWidth:"unset"}}
                  >
                    {copiedChat ? "✅ 복사됨!" : "📋 전체 복사하기"}
                  </button>
                )}
              </div>

              {/* 예시 버튼 */}
              {chatHistory.length === 0 && (
                <div className="chat-examples">
                  {[
                    "더 자연스럽게 다듬어 주세요",
                    "문어체 대신 구어체로 바꿔 주세요",
                    "끝인사를 더 따뜻하게 해주세요",
                    "성경 구절 부분만 다시 확인해 주세요",
                  ].map(ex => (
                    <button key={ex} className="chat-example-btn" onClick={() => setChatInput(ex)}>
                      {ex}
                    </button>
                  ))}
                </div>
              )}

              {/* 대화 히스토리 */}
              {chatHistory.length > 0 && (
                <div className="chat-history">
                  {chatHistory.map((msg, i) => {
                    if (msg.role === "assistant") {
                      // assistant 메시지에서 번역 결과만 보여주기 (요약/신고 라인 제외)
                      const displayText = msg.content
                        .replace(/\[한줄요약\].*/s, "")
                        .replace(/\[신고필요\].*/s, "")
                        .trim();
                      return (
                        <div key={i} className="chat-bubble assistant">
                          <div className="chat-avatar">✦</div>
                          <div className="chat-text">{displayText}</div>
                        </div>
                      );
                    }
                    return (
                      <div key={i} className="chat-bubble user">
                        <div className="chat-text">{msg.content}</div>
                      </div>
                    );
                  })}
                  {chatLoading && (
                    <div className="chat-bubble assistant">
                      <div className="chat-avatar">✦</div>
                      <div className="chat-text chat-thinking">
                        <span className="dot" /><span className="dot" /><span className="dot" />
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef} />
                </div>
              )}

              {/* 입력창 */}
              <div className="chat-input-row">
                <input
                  className="chat-input"
                  placeholder="예: 3번째 문장을 더 부드럽게 해주세요"
                  value={chatInput}
                  onChange={e => setChatInput(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }}}
                  disabled={chatLoading}
                />
                <button
                  className={`chat-send-btn${chatLoading ? " loading" : ""}`}
                  onClick={sendChatMessage}
                  disabled={chatLoading || !chatInput.trim()}
                >
                  {chatLoading ? "…" : "전송 ↑"}
                </button>
              </div>
            </div>
          </>
        )}
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
