당신은 한국컴패션 편지 번역 전문가입니다. 아래의 2025 번역유의사항 지침과 번역백서 고수편의 모든 내용을 철저히 따라 편지를 번역하세요.

## 1. 핵심 용어 번역 규칙

### 컴패션 어린이센터 관련
다음 단어들은 모두 "컴패션 어린이센터"로 번역:
- Project, center, student center, club, compassion project
- FCP, ICP, Partner church, The center, The child center
- CDC(Child Development Center), IDC(Integral Development Center)
- CDI(Child Development Institution), The project, Compassion project 등

### 선생님/교사 관련
다음 단어들은 "컴패션 어린이센터 교사"로 번역 (대필자 주석 포함):
- teacher, tutor, mentor, monitor, social worker, volunteer, accountant
- SDS, CDW(Child Development Worker), project director 등
- 단, 문맥상 실제 학교 선생님인 경우 제외

### 어린이 지칭
다음 단어들은 "어린이" 또는 어린이 이름으로 번역:
- Child, Student, the beneficiary, the participant 등
- 컴패션 공식 표현: '어린이' 또는 '후원 어린이' (아동, 후원 아동, 보호 아동 등의 표현 사용 금지)

### 4대 영역
- Cognitive Area → 지적 영역
- Socio-emotional Area → 사회정서적 영역
- Physical Area → 신체적 영역
- Spiritual Area → 영적 영역

## 2. 후원자 호칭 규칙 (어린이 → 후원자 편지)
어린이가 후원자님을 부르는 모든 호칭은 "후원자님"으로 통일합니다.
- 편지의 첫 줄(수신 인사)은 항상 "사랑하는 후원자님께"로 번역합니다.
  예) Dear OOO Church / Dear OOO Company / Dear [이름] / Dear Sponsor / Hello → 사랑하는 후원자님께
- How are you, friend? → 후원자님 어떻게 지내고 계시나요?
- What keeps you busy these days, uncle? → 어떤 일로 바쁘신가요 후원자님?
- "당신" 또는 후원자 이름으로 번역하지 않습니다.
- Mom/Dad와 같이 엄마/아빠를 표현하는 명칭은 국제 컴패션 가이드라인에 따라 번역하지 않습니다.

## 3. 날짜 번역 규칙
- 날짜가 있는 경우, 번역문 맨 첫 줄에 "날짜: 년 월 일" 형식으로 표기하고 한 줄 띄운 뒤 본문을 시작합니다.
  예) 날짜: 2017년 4월 21일
- 어린이 편지: 년, 월, 일 순으로 번역 (예: 날짜: 2017년 4월 21일)
- 후원자 편지: 영문 표준 표기법에 따라 월, 일, 년 순으로 번역 (예: 날짜: February 14, 2024)
- 날짜가 없는 편지는 날짜 줄을 생략하고 바로 본문 번역
- 어린이 첫 편지(CHINEW)에는 원래 날짜가 없음 — 정상임

## 4. 화자 구분 번역 규칙

### 핵심 원칙: 이 편지의 주인은 어린이입니다
어린이 이름으로 보내는 편지는 항상 어린이가 직접 말하는 1인칭 문체로 번역합니다.
대필자가 3인칭으로 아이를 지칭해도, 아이가 직접 말하는 것처럼 1인칭으로 바꿔 번역합니다.

### 3인칭 → 1인칭 변환 규칙 (매우 중요)
원문에 아이 이름이나 she/he로 된 3인칭 표현이 있으면 반드시 1인칭으로 바꾸세요:
- "Alpha sends greetings" → "후원자님께 인사 드려요" (편지 첫 문장은 주어 없이 시작해도 자연스러움)
- "She says she is doing well" → "잘 지내고 있어요"
- "He likes playing football" → "축구하는 것을 좋아해요"
- "[아이 이름] is grateful for your support" → "후원자님의 도움에 감사해요"
- "The child says~" / "The student mentions~" → 1인칭으로 변환

### 주어 반복 방지 규칙 (매우 중요)
한국어에서 "저는"을 매 문장마다 반복하면 매우 어색합니다. 다음 규칙을 따르세요:
- 같은 주어가 연속될 때는 주어를 생략하세요.
  나쁜 예) "저는 학교에 가요. 저는 공부를 좋아해요. 저는 친구들이 있어요."
  좋은 예) "저는 학교에 가요. 공부를 좋아하고, 친구들도 많아요."
- 문장을 자연스럽게 이어주는 접속어(그리고, 또, 그래서 등)를 활용하세요.
- 짧은 문장들은 하나로 합쳐서 번역해도 됩니다.

### 후원자에 대한 표현 처리
원문에 후원자를 "you are a faithful girl", "you are kind" 등으로 묘사할 경우,
후원자님을 "소녀", "소년" 등 성별/나이로 지칭하는 것은 자연스럽게 의역합니다:
- "You are a faithful girl" → "후원자님은 정말 신실한 분이에요"
- "You are a good man" → "후원자님은 정말 좋은 분이에요"

### 화자 구분 세부 규칙
1) 어린이가 직접 쓴 경우: 어린이 시점, 어린이 문체로 번역
2) 타자가 어린이의 말을 충실히 전달하는 경우: 어린이 시점, 어린이 문체로 번역
   예) "She says she's doing well. She's happy to write..." → "저는 잘 지내고 있어요. 편지를 쓸 수 있어 행복해요."
3) 타자가 자신의 의견을 담아 쓴 경우: 작성자 시점, 어른 문체로 번역
   예) "I am Carol's sister Mary. I am happy to tell you about Carol..." → "저는 캐롤의 언니 매리(Mary)입니다. 아이의 이야기를 전할 수 있어 기쁩니다."
## 5. 대필자 처리
- 편지 맺음말에서 어린이 이름 바로 아랫줄에 "* " 를 달고 대필 내용을 추가합니다.
- 출력 예시:
  사랑을 담아,
  다니엘 드림
  * 이 편지는 다니엘의 어머니, 마드리엔느(Madrienne)가 대필하였습니다.
- "From Madrienne, mother of Daniel" → "* 이 편지는 다니엘의 어머니, 마드리엔느(Madrienne)가 대필하였습니다."
- "Written by her tutor, Lauren" → "* 이 편지는 컴패션 어린이센터 교사, 로렌(Lauren)이 대필하였습니다."
- tutor, teacher, CDW, project director 등 센터 관련 직함은 모두 "컴패션 어린이센터 교사"로 표기합니다.
- Translator / Translated by / Verified by는 대필자가 아니므로 번역하지 않습니다.
- 대필 여부에 대한 정확한 언급이나 정보가 없을 때는 대필자 번역 생략

## 6. 그림/사진 처리
편지에 그림이나 사진이 있을 경우, 번역 본문 마지막 줄 바로 아래에 "* " 를 달고 그림 정보를 추가합니다.
- 설명 없을 때: "* 편지 2쪽에 어린이가 그린 그림이 있습니다."
- 설명 있을 때: "* 편지 2쪽에 어린이가 그린 그림이 있습니다. (집, 꽃, 나무)"
- 대필자 주석과 그림 주석이 함께 있을 경우, 어린이 이름 아래에 대필자 주석을 먼저 쓰고, 그 다음 줄에 그림 주석을 씁니다.
- 임의로 그림/사진 내용을 해석하여 번역하지 않습니다.

## 7. 성경 구절 번역
- 편지에 성경 구절이 등장하면 반드시 **개역개정 성경** 원문을 찾아 그대로 표기합니다.
- 영문 성경(NIV 등)으로 인용된 구절도 개역개정으로 변환하여 표기합니다.
- 절 번호나 책명이 편지에 명시된 경우 해당 구절의 개역개정 원문을 그대로 사용합니다.
- 편지에 성경 구절이 암시되어 있으나 출처가 명시되지 않은 경우, 문맥상 해당 구절을 특정할 수 있으면 개역개정 원문과 출처를 함께 표기합니다.
- 어떤 구절인지 특정하기 어려운 경우에만 원문 표현을 자연스럽게 번역합니다.
- 임의로 번역하거나 내용을 변형하지 않습니다.

### 성경 구절 출력 형식 (반드시 준수)
편지에 성경 구절이 나올 때마다 아래 형식을 정확히 따르세요:
후원자님과 함께 나누고 싶은 성경말씀이 있어요. [책명 장절] 말씀이에요.
"[개역개정 성경 원문]"

예시 1) 출처가 명시된 경우 (고린도후서 5:7):
후원자님과 함께 나누고 싶은 성경말씀이 있어요. 고린도후서 5장 7절 말씀이에요.
"이는 우리가 믿음으로 행하고 보는 것으로 행하지 아니함이로라"

예시 2) 출처 없이 구절 내용만 있는 경우 (시편 23:1로 특정 가능):
후원자님과 함께 나누고 싶은 성경말씀이 있어요. 시편 23편 1절 말씀이에요.
"여호와는 나의 목자시니 내게 부족함이 없으리로다"

예시 3) 암송 구절(memory verse)도 동일한 형식으로 표기합니다.
예시 4) 출처를 특정할 수 없는 경우에는 책명/장절 부분을 생략하고 구절 내용만 위 형식에 맞게 자연스럽게 번역합니다.

## 13. 고유명사 표기법
1) 사람, 지역, 음식, 기념일 이름: 음역 + 원어 표기 + 간단한 설명
   예) 세실리아(Cecilia), 캄피나 그란데(Campina Grande, 브라질의 도시)
   예) 우갈리(Ugali, 옥수수나 기장 가루로 만든 아프리카 음식으로 보통 고기나 채소와 함께 먹음)
   예) 차파티(Chapati, 아프리카식 팬케익), 아도보(Adobo, 필리핀의 대표 전통 음식)
   예) 훌깐(Julcan, 페루의 지명), 후닌(Junin, 페루 중부에 위치한 도시)
2) 알파벳 약자로 적힌 기관명, 질병 이름, 전문용어: 단어 그대로 사용 (필요 시만 설명 추가)
3) 브랜드명이나 애니메이션 제목 등은 정확한 한국어 표기를 사용
   예) 졸리비(Jollibee, 필리핀 패스트푸드 브랜드), 리틀 프린세스 소피아(Sofia the First, 디즈니 애니메이션)

## 14. 문법 오류 처리 (번역백서 고수편 1장)
- 아프리카 영어: "Am happy" → "I am happy"처럼 주어 생략이 자연스러운 표현. "Am"은 1인칭에만 쓰이므로 주어는 "I"로 유추
- 비영어권 어린이의 문법 오류: 전체 문맥을 파악하여 자연스럽게 다듬어 번역
- 어순이나 시제가 맞지 않아도 의미와 시점을 문맥으로 파악하여 번역
- 영어를 직접 쓰는 국가(가나GH, 케냐KE, 필리핀PH, 탄자니아TZ, 우간다UG)의 편지는 손글씨이거나 철자 오류가 있어도 문맥으로 파악하여 번역
- Broken English로 쓰인 편지는 맥락 속에서 의미와 시점을 파악하여 자연스럽게 다듬어 번역

## 15. 자연스러운 한국어 번역 원칙 (번역백서 고수편 3장)

### 번역 투 표현 피하기
- 수동태 → 능동문: "Your letter was well received." → "후원자님의 편지를 잘 받아 보았어요."
- "~에도 불구하고(in spite of)" → "~하지만", "~하는데도", "~에도", "~상황 속에서도"
- "~에 위치하다(be located in)" → "~에 있어요"
- "~으로부터(from)" + 장소 → "~에서"
- "~으로부터 ~의" (단순 수식) → "~의"
- 직역 피하기: "She has a sweet voice." → "그녀는 목소리가 아름답다."

### 긴 문장 처리
- 문장이 지나치게 길면 후원자님이 이해하기 쉽도록 적당한 길이로 나눠 번역
- 주어와 서술어의 호응이 맞는지 반드시 확인
- 편지 내용이 길면 인사말/안부/학교생활/센터생활/기도제목/맺음말 등으로 적절히 문단 구분

## 16. 번역 톤
- 어린이가 후원자님께 쓰는 편지임을 항상 기억
- 어린이다운 표현, 순수함, 감사함이 잘 전달되도록 번역
- 후원자님을 향한 존경과 애정이 느껴지도록 번역
- 교과서식 표현 피하기: "I was too tired to do that." → "너무 피곤해서 할 수 없었어요."
- 내가 일상생활에서 사용하는 표현인지 항상 확인

## 17. 후원자 편지 번역 시 주의사항 (번역백서 고수편 4장)
- 후원자 편지(한→영)의 경우 원문의 주어를 명확하게 파악한 후 번역
- 문장이 지나치게 길거나 주술 호응이 맞지 않으면, 간결한 여러 문장으로 정리 후 번역
- 어린이 이름은 시스템에서 제공하는 철자와 동일하게 표기
- 후원자님의 정서와 감정이 자연스럽게 드러나도록 다듬어 번역

## 18. 어린이 보호 (Child Protection) 신고 지침 (번역백서 고수편 5장)

번역 중 아래 내용이 발견되면 반드시 번역을 완료한 뒤 [신고필요] 태그를 추가하고, 신고 사유를 간략히 명시하세요. 번역 내용 자체는 정확하게 그대로 번역합니다.

### 반드시 신고해야 하는 내용
1. **신체적 학대**: 어린이가 가족, 친구, 이웃 등 제3자로부터 신체적 폭력·폭행을 당하고 있다는 정황
2. **정서적 학대**: 조롱, 위협, 협박, 차별, 거부, 적대적 대우 등 정서적 학대를 받고 있다는 정황
3. **성적 학대**: 성추행, 성폭행 등 성적 학대를 당했거나 그 결과(임신, 출산 등)에 대한 언급
4. **방임·방치**: 적절한 양육 환경이 제공되지 않거나 기본적 필요(음식, 의료 등)가 충족되지 않는 정황
5. **착취**: 상업적 착취, 아동 노동, 강제 결혼 등

### 신고 시 [신고필요] 태그 사용법
- 번역 완료 후 맨 마지막 줄에 다음과 같이 추가:
  [신고필요] 사유: (예: 제3자에 의한 성폭행 정황 / 부모로부터 신체적 학대 정황 / 정서적 학대 및 방임 정황 등)
- 정확한 판단이 어려운 경우에도 의심되면 [신고필요] 태그를 추가하세요. 담당 직원이 최종 판단합니다.
- 신고 후 편지 내용은 외부에 절대 유출하지 말 것 — 편지 내용은 개인정보와 동일하게 취급됩니다.

        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
          --cream: #fdf8f1;
          --warm: #f5ede0;

          --brown: #7a4f2e;

        }
        body { background: var(--cream); font-family: 'Noto Sans KR', sans-serif; color: var(--brown-dark); min-height: 100vh; }
        .app { max-width: 740px; margin: 0 auto; padding: 28px 16px 80px; }
        .header { text-align: center; margin-bottom: 28px; background: var(--paper); border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-lg); overflow: hidden; }
        .header-top { background: linear-gradient(135deg, #3d2010 0%, #7a4f2e 50%, #cf6b2e 100%); padding: 28px 24px 24px; color: #fff; }
        .header-badge { display: inline-block; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); color: #fde8c8; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 4px 14px; border-radius: 20px; margin-bottom: 14px; }
        .header h1 { font-family: 'Nanum Myeongjo', serif; font-size: 26px; font-weight: 800; line-height: 1.3; color: #fff; margin-bottom: 6px; }
        .header-sub { color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 300; }
        .header-bottom { padding: 14px 20px; background: var(--warm); display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .header-tag { font-size: 11.5px; color: var(--brown); font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .header-tag::before { content: '✓'; color: var(--accent); font-weight: 700; }
        .steps { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 24px; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
        .step-dot.active { background: var(--accent); transform: scale(1.3); }
        .step-dot.done { background: var(--green); }
        .card { background: var(--paper); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
        .card-num { width: 28px; height: 28px; background: var(--accent); color: #fff; border-radius: 50%; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-title { font-family: 'Nanum Myeongjo', serif; font-size: 16px; font-weight: 700; color: var(--brown-dark); }
        .card-title span { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 400; color: var(--brown-light); margin-left: 4px; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11.5px; font-weight: 600; color: var(--brown-mid); letter-spacing: 0.04em; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--brown-dark); font-family: 'Noto Sans KR', sans-serif; font-size: 13.5px; transition: border-color 0.2s, box-shadow 0.2s; outline: none; appearance: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(207,107,46,0.1); }
        textarea { min-height: 150px; resize: vertical; line-height: 1.8; }
        .letter-type-tabs { display: flex; gap: 10px; }
        .letter-type-tab { flex: 1; padding: 13px; border: 2px solid var(--border); border-radius: 12px; background: var(--cream); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600; color: var(--brown-mid); cursor: pointer; text-align: center; transition: all 0.2s; }
        .letter-type-tab.active { border-color: var(--accent); background: #fdf3ea; color: var(--accent); }
        .tabs { display: flex; background: var(--warm); border-radius: 10px; padding: 4px; margin-bottom: 16px; }
        .tab { flex: 1; padding: 9px; border: none; background: transparent; border-radius: 7px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; color: var(--brown-mid); cursor: pointer; transition: all 0.2s; }
        .tab.active { background: #fff; color: var(--accent); font-weight: 700; box-shadow: 0 2px 8px rgba(61,32,16,0.1); }

        .upload-icon { font-size: 32px; margin-bottom: 8px; }

        .image-preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 14px; }

        .image-remove-btn { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; border-radius: 50%; background: rgba(192,57,43,0.85); color: #fff; border: none; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .image-remove-btn:hover { background: #c0392b; }
        .image-add-more { border: 2px dashed var(--border); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: var(--brown-mid); aspect-ratio: 3/4; transition: all 0.2s; font-weight: 600; }
        .image-add-more:hover { border-color: var(--accent); color: var(--accent); background: #fdf3ea; }
        .page-detected-badge { position: absolute; top: 5px; left: 5px; background: rgba(74,114,85,0.88); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 6px; }
        .page-detecting-overlay { position: absolute; inset: 0; background: rgba(253,248,241,0.6); display: flex; align-items: center; justify-content: center; }
        .page-detect-spin { width: 22px; height: 22px; border: 3px solid #e8c9a0; border-top-color: var(--accent); border-radius: 50%; animation: spin2 0.7s linear infinite; }
        @keyframes spin2 { to { transform: rotate(360deg); } }
        .tone-list { display: flex; flex-direction: column; gap: 8px; }
        .tone-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border: 1.5px solid var(--border); border-radius: 11px; cursor: pointer; transition: all 0.2s; background: var(--cream); }
        .tone-item:hover { border-color: var(--accent-light); }
        .tone-item.sel { border-color: var(--accent); background: #fdf3ea; }
        .tone-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; background: #fff; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .tone-item.sel .tone-radio { border-color: var(--accent); background: var(--accent); }
        .tone-item.sel .tone-radio::after { content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%; }
        .tone-label { font-size: 14px; font-weight: 600; color: var(--brown-dark); }
        .tone-desc { font-size: 11.5px; color: var(--brown-mid); margin-top: 1px; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: #fdf3ea; border: 1.5px solid #e8c9a0; border-radius: 10px; cursor: pointer; margin-top: 10px; transition: all 0.2s; user-select: none; }
        .checkbox-row.checked { background: #fef6ec; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(207,107,46,0.12); }
        .checkbox-custom { width: 20px; height: 20px; border-radius: 6px; border: 2px solid #c8a87a; background: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 12px; }
        .checkbox-row.checked .checkbox-custom { background: var(--accent); border-color: var(--accent); color: #fff; }
        .checkbox-label { font-size: 13px; color: var(--brown); font-weight: 500; }
        .checkbox-row.checked .checkbox-label { font-weight: 700; color: var(--accent); }
        .sub-input { margin-top: 8px; position: relative; }
        .detect-spinner { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border: 2px solid #e8c9a0; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        .detect-hint { font-size: 11px; color: var(--brown-mid); margin-top: 5px; display: flex; align-items: center; gap: 5px; }
        .voice-toggle { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
        .voice-toggle-label { font-size: 11.5px; font-weight: 700; color: var(--brown-mid); letter-spacing: 0.03em; }
        .voice-toggle-options { display: flex; gap: 7px; flex-wrap: wrap; }
        .voice-btn { flex: 1; min-width: 130px; padding: 8px 12px; border-radius: 9px; border: 1.5px solid var(--border); background: #fff; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 500; color: var(--brown-mid); cursor: pointer; transition: all 0.18s; text-align: center; }
        .voice-btn:hover { border-color: var(--accent-light); color: var(--brown); }
        .voice-btn.active { border-color: var(--accent); background: #fdf3ea; color: var(--accent); font-weight: 700; box-shadow: 0 0 0 2px rgba(207,107,46,0.15); }
        @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
        .warning-box { background: #fff8e6; border: 1px solid #f5d87a; border-radius: 10px; padding: 12px 16px; font-size: 12px; color: #7a5800; margin-bottom: 16px; line-height: 1.7; }
        .warning-box strong { font-weight: 700; }
        .country-notice { background: #e8f4ff; border: 1px solid #a8d0f0; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #1a5080; margin-top: 10px; line-height: 1.6; }
        .country-notice strong { font-weight: 700; }
        .country-trigger { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--brown-dark); font-family: 'Noto Sans KR', sans-serif; font-size: 13.5px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; user-select: none; }
        .country-trigger:hover, .country-trigger.open { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(207,107,46,0.1); }
        .country-trigger strong { font-weight: 800; letter-spacing: 0.03em; color: var(--accent); margin-right: 5px; }
        .country-arrow { font-size: 10px; color: var(--brown-light); margin-left: 6px; flex-shrink: 0; }
        .country-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--paper); border: 1.5px solid var(--border); border-radius: 10px; box-shadow: 0 8px 24px rgba(61,32,16,0.13); z-index: 200; max-height: 240px; overflow-y: auto; }
        .country-option { padding: 9px 14px; font-size: 13.5px; cursor: pointer; transition: background 0.15s; color: var(--brown-dark); font-family: 'Noto Sans KR', sans-serif; }
        .country-option:hover { background: #fdf3ea; }
        .country-option.active { background: #fdf0e3; color: var(--accent); }
        .country-option strong { font-weight: 800; letter-spacing: 0.03em; color: var(--accent); margin-right: 6px; }
        .country-option.active strong { color: var(--accent); }
        .country-option-empty { color: var(--brown-light); font-size: 13px; }
        .country-notice strong { font-weight: 700; }
        .btn-translate { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(135deg, #cf6b2e, #7a4f2e); color: #fff; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 18px rgba(207,107,46,0.35); transition: all 0.2s; letter-spacing: 0.03em; }
        .btn-translate:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(207,107,46,0.45); }
        .btn-translate:active { transform: translateY(0); }
        .btn-translate:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
        .btn-secondary { padding: 10px 20px; background: var(--warm); color: var(--brown); border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-secondary:hover { background: #eedecf; }
        .btn-retranslate { padding: 10px 20px; background: #fdf0e3; color: var(--accent); border: 1.5px solid var(--accent-light); border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-retranslate:hover { background: #fde3cc; border-color: var(--accent); }
        .btn-copy { padding: 10px 20px; background: var(--brown-dark); color: #fff; border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.15s; min-width: 148px; }
        .btn-copy:hover { background: var(--brown); }
        .btn-copy.copied { background: var(--green); transform: scale(1.04); }
        .loading { text-align: center; padding: 56px 20px; }

        .dots { display: flex; justify-content: center; gap: 10px; }

        .result-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }

        .meta-chip.accent { background: #fdf0e3; border-color: var(--accent-light); color: var(--accent); }
        .translation-box { background: #fffdf8; border: 1.5px solid var(--border); border-left: 4px solid var(--accent); border-radius: 12px; padding: 22px; font-size: 14.5px; line-height: 1.95; color: var(--brown-dark); white-space: pre-wrap; margin-bottom: 14px; font-family: 'Nanum Myeongjo', serif; }

        .guideline-note strong { font-weight: 700; }

        .cp-steps { margin-top: 10px; font-size: 12px; color: #7a2020; line-height: 1.8; }
        .cp-steps strong { font-weight: 700; }

        .action-row { display: flex; gap: 10px; flex-wrap: wrap; }

        .chat-example-btn:hover { border-color: var(--accent); color: var(--accent); background: #fdf3ea; }
        .chat-history { display: flex; flex-direction: column; gap: 12px; max-height: 420px; overflow-y: auto; padding: 4px 0 8px; margin-bottom: 14px; }
        .chat-bubble { display: flex; gap: 10px; align-items: flex-start; }
